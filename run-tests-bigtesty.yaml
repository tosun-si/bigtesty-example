steps:
  - id: start-dind
    name: docker/compose
    args: [ '-f', 'docker-compose.yaml', 'up', 'dind-service' ]
  - id: 'Check service is listening'
    name: alpine:latest
    args:
      - '-eEuo'
      - 'pipefail'
      - '-c'
      - |-
        apk add curl
        until $(curl dind-service:2376); do
          echo '##################Waiting################'
          sleep 5
        done
        curl dind-service:2376
    entrypoint: "sh"
    #    args: [ "dind-service:2375" ]
    #   waitFor: [ start-dind ]
    waitFor: [ '-' ]
